{{define "form/inbound"}}
<div id="inbound-app"></div>

<!-- 动画 CSS -->
<style scoped>
.slide-left-enter-active, .slide-left-leave-active { transition: all 0.4s ease; }
.slide-left-leave-active { position: absolute; width: 100%; }
.slide-left-enter-from { transform: translateX(100%); opacity: 0; }
.slide-left-enter-to { transform: translateX(0); opacity: 1; }
.slide-left-leave-from { transform: translateX(0); opacity: 1; }
.slide-left-leave-to { transform: translateX(-100%); opacity: 0; }

.slide-right-enter-active, .slide-right-leave-active { transition: all 0.4s ease; }
.slide-right-leave-active { position: absolute; width: 100%; }
.slide-right-enter-from { transform: translateX(-100%); opacity: 0; }
.slide-right-enter-to { transform: translateX(0); opacity: 1; }
.slide-right-leave-from { transform: translateX(0); opacity: 1; }
.slide-right-leave-to { transform: translateX(100%); opacity: 0; }
</style>

<script>
new Vue({
  el: '#inbound-app',
  data() {
    return {
      steps: ["基础设置","协议设置","传输/TLS","嗅探"],
      inbound: { _step: 0, protocol: '' },
      dbInbound: { enable: true, remark: '', listen: '', port: null, totalGB: 0, _expiryTime: null },
      protocols: ["vmess","vless","trojan","shadowsocks","dokodemo","socks","http","wireguard"],
      transitionName: 'slide-right',
      datepicker: 'gregorian' // 可根据实际设置
    }
  },
  computed: {
    protocolComponent() {
      switch(this.inbound.protocol) {
        case 'vmess': return 'form-vmess';
        case 'vless': return 'form-vless';
        case 'trojan': return 'form-trojan';
        case 'shadowsocks': return 'form-shadowsocks';
        case 'dokodemo': return 'form-dokodemo';
        case 'socks': return 'form-socks';
        case 'http': return 'form-http';
        case 'wireguard': return 'form-wireguard';
        default: return null;
      }
    }
  },
  watch: {
    'inbound._step'(newStep, oldStep) {
      this.transitionName = newStep > oldStep ? 'slide-left' : 'slide-right';
    }
  },
  template: `
    <a-form :model="dbInbound" layout="vertical">
      <!-- 步骤条 -->
      <a-steps :current="inbound._step" size="small" style="margin-bottom: 16px;">
        <a-step v-for="(s,index) in steps" :key="index" :title="s" />
      </a-steps>

      <!-- 进度条 -->
      <a-progress :percent="Math.round(((inbound._step+1)/steps.length)*100)" show-info style="margin-bottom: 20px;" />

      <!-- 步骤内容 -->
      <transition :name="transitionName" mode="out-in">
        <div :key="inbound._step" style="min-height: 200px; padding: 8px 0; position: relative;">
          
          <!-- 步骤一：基础设置 -->
          <div v-if="inbound._step === 0">
            <a-form-item :label="'启用'">
              <a-switch v-model:checked="dbInbound.enable" />
            </a-form-item>

            <a-form-item :label="'备注'">
              <a-input v-model:value="dbInbound.remark" />
            </a-form-item>

            <a-form-item :label="'协议'">
              <a-select v-model:value="inbound.protocol" style="width: 200px">
                <a-select-option v-for="p in protocols" :key="p" :value="p" v-text="p"></a-select-option>
              </a-select>
            </a-form-item>

            <a-form-item :label="'监听地址'">
              <a-input v-model:value="dbInbound.listen" placeholder="0.0.0.0" />
            </a-form-item>

            <a-form-item :label="'端口'">
              <a-input-number v-model:value="dbInbound.port" style="width: 200px" />
            </a-form-item>

            <!-- 总流量 -->
            <a-form-item>
              <template slot="label">
                <a-tooltip>
                  <template slot="title">0 <span>无限制</span></template>
                  总流量
                  <a-icon type="question-circle"></a-icon>
                </a-tooltip>
              </template>
              <a-input-number v-model.number="dbInbound.totalGB" :min="0" />
            </a-form-item>

            <!-- 过期时间 -->
            <a-form-item>
              <template slot="label">
                <a-tooltip>
                  <template slot="title"><span>留空则永不过期</span></template>
                  过期时间
                  <a-icon type="question-circle"></a-icon>
                </a-tooltip>
              </template>
              <a-date-picker v-if="datepicker==='gregorian'" :style="{ width:'100%' }" :show-time="{ format: 'HH:mm:ss' }"
                format="YYYY-MM-DD HH:mm:ss" v-model="dbInbound._expiryTime" >
              </a-date-picker>
              <a-persian-datepicker v-else placeholder="请选择日期" v-model="dbInbound._expiryTime"></a-persian-datepicker>
            </a-form-item>
          </div>

          <!-- 步骤二：协议设置 -->
          <div v-if="inbound._step === 1">
            <component v-if="protocolComponent" :is="protocolComponent"></component>
            <a-alert v-else type="warning" message="请选择协议" show-icon class="mb-16" />
          </div>

          <!-- 步骤三：传输/TLS -->
          <div v-if="inbound._step === 2">
            <template v-if="inbound.canEnableStream && inbound.canEnableStream()">
              <form-stream-settings></form-stream-settings>
              <form-external-proxy></form-external-proxy>
            </template>
            <template v-if="inbound.canEnableTls && inbound.canEnableTls()">
              <form-tls-settings></form-tls-settings>
            </template>
          </div>

          <!-- 步骤四：嗅探 -->
          <div v-if="inbound._step === 3">
            <form-sniffing></form-sniffing>
          </div>

        </div>
      </transition>

      <!-- 步骤按钮 -->
      <div style="margin-top: 20px; text-align: right;">
        <a-button :disabled="inbound._step===0" @click="inbound._step--" style="margin-right: 8px;">上一步</a-button>
        <a-button type="primary" v-if="inbound._step < steps.length-1" @click="inbound._step++">下一步</a-button>
        <a-button type="primary" v-if="inbound._step===steps.length-1" @click="$emit('ok', dbInbound)">完成</a-button>
      </div>

    </a-form>
  `
});
</script>
{{end}}

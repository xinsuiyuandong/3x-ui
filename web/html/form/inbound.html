{{define "form/inbound"}}
<a-form :model="dbInbound" layout="vertical">

  <!-- 步骤条 -->
  <a-steps :current="inbound._step" size="small" style="margin-bottom: 20px;">
    <a-step title="基础设置" />
    <a-step title="协议设置" />
    <a-step title="网络 / TLS" />
    <a-step title="嗅探" />
  </a-steps>

  <!-- 步骤一：基础设置 -->
  <div v-show="inbound._step === 0">
    <a-form-item :label="i18n('inbound.enable')">
      <a-switch v-model:checked="dbInbound.enable" />
    </a-form-item>

    <a-form-item :label="i18n('inbound.remark')">
      <a-input v-model:value="dbInbound.remark" />
    </a-form-item>

    <a-form-item :label="i18n('inbound.protocol')">
      <a-select v-model:value="inbound.protocol" style="width: 200px">
        <a-select-option v-for="p in protocols" :key="p" :value="p">{{p}}</a-select-option>
      </a-select>
    </a-form-item>

    <a-form-item :label="i18n('inbound.listen')">
      <a-input v-model:value="dbInbound.listen" placeholder="0.0.0.0" />
    </a-form-item>

    <a-form-item :label="i18n('inbound.port')">
      <a-input-number v-model:value="dbInbound.port" style="width: 200px" />
    </a-form-item>
  </div>

  <!-- 步骤二：协议设置 -->
  <div v-show="inbound._step === 1">
    <!-- 协议相关配置，保持原有逻辑 -->
    <div v-if="inbound.protocol === 'vmess'">
      <a-form-item :label="i18n('inbound.clientId')">
        <a-input v-model:value="dbInbound.settings.clients[0].id" />
      </a-form-item>
      <a-form-item :label="i18n('inbound.alterId')">
        <a-input-number v-model:value="dbInbound.settings.clients[0].alterId" style="width: 200px" />
      </a-form-item>
    </div>

    <div v-if="inbound.protocol === 'shadowsocks'">
      <a-form-item :label="i18n('inbound.password')">
        <a-input v-model:value="dbInbound.settings.password" />
      </a-form-item>
      <a-form-item :label="i18n('inbound.method')">
        <a-input v-model:value="dbInbound.settings.method" />
      </a-form-item>
    </div>

    <div v-if="inbound.protocol === 'trojan'">
      <a-form-item :label="i18n('inbound.password')">
        <a-input v-model:value="dbInbound.settings.clients[0].password" />
      </a-form-item>
    </div>
  </div>

  <!-- 步骤三：网络 / TLS -->
  <div v-show="inbound._step === 2">
    <a-form-item :label="i18n('inbound.streamSettings')">
      <a-select v-model:value="inbound.stream.network" style="width: 200px">
        <a-select-option value="tcp">TCP</a-select-option>
        <a-select-option value="ws">WebSocket</a-select-option>
        <a-select-option value="http">HTTP</a-select-option>
      </a-select>
    </a-form-item>

    <a-form-item :label="i18n('inbound.security')">
      <a-select v-model:value="inbound.stream.security" style="width: 200px">
        <a-select-option value="none">None</a-select-option>
        <a-select-option value="tls">TLS</a-select-option>
      </a-select>
    </a-form-item>

    <div v-if="inbound.stream.security === 'tls'">
      <a-form-item :label="i18n('inbound.certFile')">
        <a-input v-model:value="inbound.stream.tlsSettings.certFile" />
      </a-form-item>
      <a-form-item :label="i18n('inbound.keyFile')">
        <a-input v-model:value="inbound.stream.tlsSettings.keyFile" />
      </a-form-item>
    </div>
  </div>

  <!-- 步骤四：嗅探 -->
  <div v-show="inbound._step === 3">
    <a-form-item :label="i18n('inbound.sniffing')">
      <a-switch v-model:checked="inbound.sniffing.enabled" />
    </a-form-item>
    <a-form-item v-if="inbound.sniffing.enabled" :label="i18n('inbound.destOverride')">
      <a-select v-model:value="inbound.sniffing.destOverride" mode="multiple" style="width: 300px">
        <a-select-option value="http">HTTP</a-select-option>
        <a-select-option value="tls">TLS</a-select-option>
      </a-select>
    </a-form-item>
  </div>

  <!-- 步骤按钮 -->
  <div style="margin-top: 20px; text-align: right;">
    <a-button v-if="inbound._step > 0" @click="inbound._step--" style="margin-right: 8px;">
      上一步
    </a-button>
    <a-button type="primary" v-if="inbound._step < 3" @click="inbound._step++">
      下一步
    </a-button>
    <a-button type="primary" v-if="inbound._step === 3" @click="$emit('ok')">
      完成
    </a-button>
  </div>
</a-form>

<script>
export default {
  created() {
    if (this.inbound._step === undefined) {
      this.$set(this.inbound, '_step', 0);
    }
  }
}
</script>
{{end}}

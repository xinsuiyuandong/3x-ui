{{define "modals/inboundModal"}}
<a-modal
  id="inbound-modal"
  v-model="inModal.visible"
  :title="inModal.title"
  :dialog-style="{ top: '20px' }"
  @ok="submit"
  :confirm-loading="inModal.confirmLoading"
  :closable="true"
  :mask-closable="false"
  :class="themeSwitcher.currentTheme"
  :wrapClassName="themeSwitcher.currentTheme"
  :ok-text="inModal.okText"
  cancel-text='{{ i18n "close" }}'>

  <!-- 向导步骤条 -->
  <a-steps :current="currentStep - 1" :style="{ marginBottom: '16px' }">
    <a-step title="基础信息"></a-step>
    <a-step title="协议与传输"></a-step>
    <a-step title="进阶设置"></a-step>
    <a-step title="确认提交"></a-step>
  </a-steps>

  <a-progress :percent="(currentStep / maxStep) * 100" status="active" :stroke-width="8" />

  <!-- 表单主体 -->
  {{template "form/inbound"}}

  <!-- 自定义底部按钮 -->
  <template slot="footer">
    <a-button @click="close">{{ i18n "close" }}</a-button>
    <a-button v-if="currentStep > 1" @click="prevStep">上一步</a-button>
    <a-button type="primary" v-if="currentStep < maxStep" @click="nextStep">下一步</a-button>
    <a-button type="primary" :loading="inModal.confirmLoading" v-if="currentStep === maxStep" @click="submit">提交</a-button>
  </template>
</a-modal>

<style>
/* —— 暗色主题可读性增强 —— */
/* 你的 modal 上挂了 themeSwitcher.currentTheme（通常为 .dark 或 .dark-theme） */
#inbound-modal.dark .ant-form-item-label > label,
#inbound-modal.dark .ant-typography,
#inbound-modal.dark .ant-descriptions,
#inbound-modal.dark .ant-descriptions-item-label,
#inbound-modal.dark .ant-steps-item-title,
#inbound-modal.dark .ant-progress-text { color: #fff; }

#inbound-modal.dark .ant-input,
#inbound-modal.dark .ant-select-selection-selected-value,
#inbound-modal.dark .ant-select-selection__placeholder,
#inbound-modal.dark .ant-input-number-input { color: #fff; }

#inbound-modal.dark .ant-input,
#inbound-modal.dark .ant-select-selection,
#inbound-modal.dark .ant-input-number,
#inbound-modal.dark .ant-picker { background: #1f1f1f; border-color: #434343; }

#inbound-modal.dark .ant-collapse > .ant-collapse-item > .ant-collapse-header { color: #fff; }

/* 兼容可能使用的另一种类名 */
#inbound-modal.dark-theme .ant-form-item-label > label,
#inbound-modal.dark-theme .ant-typography,
#inbound-modal.dark-theme .ant-descriptions,
#inbound-modal.dark-theme .ant-descriptions-item-label,
#inbound-modal.dark-theme .ant-steps-item-title,
#inbound-modal.dark-theme .ant-progress-text { color: #fff; }
#inbound-modal.dark-theme .ant-input,
#inbound-modal.dark-theme .ant-select-selection-selected-value,
#inbound-modal.dark-theme .ant-select-selection__placeholder,
#inbound-modal.dark-theme .ant-input-number-input { color: #fff; }
#inbound-modal.dark-theme .ant-input,
#inbound-modal.dark-theme .ant-select-selection,
#inbound-modal.dark-theme .ant-input-number,
#inbound-modal.dark-theme .ant-picker { background: #1f1f1f; border-color: #434343; }
</style>

<script>
const inModal = {
  title: '',
  visible: false,
  confirmLoading: false,
  okText: '{{ i18n "sure" }}',
  isEdit: false,
  confirm: null,
  inbound: new Inbound(),
  dbInbound: new DBInbound(),
  ok() {
    ObjectUtil.execute(inModal.confirm, inModal.inbound, inModal.dbInbound);
  },
  show({ title = '', okText = '{{ i18n "sure" }}', inbound = null, dbInbound = null, confirm = (inbound, dbInbound) => {}, isEdit = false }) {
    this.title = title;
    this.okText = okText;
    this.inbound = inbound ? Inbound.fromJson(inbound.toJson()) : new Inbound();
    this.dbInbound = dbInbound ? new DBInbound(dbInbound) : new DBInbound();
    this.confirm = confirm;
    this.visible = true;
    this.isEdit = isEdit;
  },
  close() {
    inModal.visible = false;
    inModal.loading(false);
  },
  loading(loading = true) {
    inModal.confirmLoading = loading;
  },
};

new Vue({
  delimiters: ['[[', ']]'],
  el: '#inbound-modal',
  data: {
    currentStep: 1,
    maxStep: 4,
    inModal: inModal,
    delayedStart: false
  },
  computed: {
    inbound() {
      return inModal.inbound;
    },
    dbInbound() {
      return inModal.dbInbound;
    },
    isEdit() {
      return inModal.isEdit;
    },
    client() {
      return inModal.inbound.clients[0];
    },
    datepicker() {
      return app.datepicker;
    },
    delayedExpireDays: {
      get() {
        return this.client && this.client.expiryTime < 0 ? this.client.expiryTime / -86400000 : 0;
      },
      set(days) {
        this.client.expiryTime = -86400000 * days;
      }
    },
    externalProxy: {
      get() {
        return this.inbound.stream.externalProxy.length > 0;
      },
      set(value) {
        if (value) {
          inModal.inbound.stream.externalProxy = [{
            forceTls: "same",
            dest: window.location.hostname,
            port: inModal.inbound.port,
            remark: ""
          }];
        } else {
          inModal.inbound.stream.externalProxy = [];
        }
      }
    }
  },
  watch: {
    'inModal.visible'(v) {
      if (v) this.currentStep = 1; // 每次打开向导重置为第1步
    }
  },
  methods: {
    streamNetworkChange() {
      if (!inModal.inbound.canEnableTls()) {
        this.inModal.inbound.stream.security = 'none';
      }
      if (!inModal.inbound.canEnableReality()) {
        this.inModal.inbound.reality = false;
      }
      if (this.inModal.inbound.protocol == Protocols.VLESS && !inModal.inbound.canEnableTlsFlow()) {
        this.inModal.inbound.settings.vlesses.forEach(client => {
          client.flow = "";
        });
      }
    },
    SSMethodChange() {
      this.inModal.inbound.settings.password = RandomUtil.randomShadowsocksPassword(this.inModal.inbound.settings.method);

      if (this.inModal.inbound.isSSMultiUser) {
        if (this.inModal.inbound.settings.shadowsockses.length == 0) {
          this.inModal.inbound.settings.shadowsockses = [new Inbound.ShadowsocksSettings.Shadowsocks()];
        }
        if (!this.inModal.inbound.isSS2022) {
          this.inModal.inbound.settings.shadowsockses.forEach(client => { client.method = this.inModal.inbound.settings.method; });
        } else {
          this.inModal.inbound.settings.shadowsockses.forEach(client => { client.method = ""; });
        }
        this.inModal.inbound.settings.shadowsockses.forEach(client => {
          client.password = RandomUtil.randomShadowsocksPassword(this.inModal.inbound.settings.method);
        });
      } else {
        if (this.inModal.inbound.settings.shadowsockses.length > 0) {
          this.inModal.inbound.settings.shadowsockses = [];
        }
      }
    },
    setDefaultCertData(index) {
      inModal.inbound.stream.tls.certs[index].certFile = app.defaultCert;
      inModal.inbound.stream.tls.certs[index].keyFile = app.defaultKey;
    },
    async getNewX25519Cert() {
      inModal.loading(true);
      const msg = await HttpUtil.post('/server/getNewX25519Cert');
      inModal.loading(false);
      if (!msg.success) return;
      inModal.inbound.stream.reality.privateKey = msg.obj.privateKey;
      inModal.inbound.stream.reality.settings.publicKey = msg.obj.publicKey;
    },
    async getNewmldsa65() {
      inModal.loading(true);
      const msg = await HttpUtil.post('/server/getNewmldsa65');
      inModal.loading(false);
      if (!msg.success) return;
      inModal.inbound.stream.reality.mldsa65Seed = msg.obj.seed;
      inModal.inbound.stream.reality.settings.mldsa65Verify = msg.obj.verify;
    },
    async getNewEchCert() {
      inModal.loading(true);
      const msg = await HttpUtil.post('/server/getNewEchCert', { sni: inModal.inbound.stream.tls.sni });
      inModal.loading(false);
      if (!msg.success) return;
      inModal.inbound.stream.tls.echServerKeys = msg.obj.echServerKeys;
      inModal.inbound.stream.tls.settings.echConfigList = msg.obj.echConfigList;
    },

    // —— 向导逻辑 ——
    nextStep() {
      if (!this.validateStep(this.currentStep)) return;
      if (this.currentStep < this.maxStep) this.currentStep += 1;
    },
    prevStep() {
      if (this.currentStep > 1) this.currentStep -= 1;
    },
    submit() {
      if (this.currentStep < this.maxStep) {
        this.currentStep = this.maxStep;
        return;
      }
      if (!this.validateStep(this.currentStep)) return;
      // 调用原有确认逻辑
      inModal.ok();
    },
    close() {
      inModal.visible = false;
    },
    validateStep(step) {
      if (step === 1) {
        if (!this.inbound.port || this.inbound.port <= 0) {
          this.$message.error('{{ i18n "pages.inbounds.port" }}' + ' 不能为空');
          return false;
        }
        if (!this.inbound.protocol) {
          this.$message.error('{{ i18n "protocol" }}' + ' 不能为空');
          return false;
        }
      }
      return true;
    }
  }
});
</script>
{{end}}
